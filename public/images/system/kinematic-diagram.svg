<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="Pretendard, -apple-system, sans-serif">
  <!-- 배경 -->
  <rect width="800" height="320" fill="#F8F2E5"/>

  <!-- 4단계 박스 -->
  <g>
    <!-- 01 하체 -->
    <rect x="30" y="100" width="160" height="120" rx="4" fill="#FFFFFF" stroke="#B8985C" stroke-width="2"/>
    <text x="110" y="135" text-anchor="middle" font-size="13" fill="#B8985C" font-weight="600" letter-spacing="2">01</text>
    <text x="110" y="170" text-anchor="middle" font-size="22" fill="#0F0F0E" font-weight="700">하체</text>
    <text x="110" y="195" text-anchor="middle" font-size="12" fill="#666" letter-spacing="1">Pelvis</text>

    <!-- 화살표 -->
    <line x1="195" y1="160" x2="225" y2="160" stroke="#B8985C" stroke-width="2"/>
    <polygon points="225,155 240,160 225,165" fill="#B8985C"/>

    <!-- 02 상체 -->
    <rect x="245" y="100" width="160" height="120" rx="4" fill="#FFFFFF" stroke="#B8985C" stroke-width="2"/>
    <text x="325" y="135" text-anchor="middle" font-size="13" fill="#B8985C" font-weight="600" letter-spacing="2">02</text>
    <text x="325" y="170" text-anchor="middle" font-size="22" fill="#0F0F0E" font-weight="700">상체</text>
    <text x="325" y="195" text-anchor="middle" font-size="12" fill="#666" letter-spacing="1">Torso</text>

    <line x1="410" y1="160" x2="440" y2="160" stroke="#B8985C" stroke-width="2"/>
    <polygon points="440,155 455,160 440,165" fill="#B8985C"/>

    <!-- 03 팔 -->
    <rect x="460" y="100" width="160" height="120" rx="4" fill="#FFFFFF" stroke="#B8985C" stroke-width="2"/>
    <text x="540" y="135" text-anchor="middle" font-size="13" fill="#B8985C" font-weight="600" letter-spacing="2">03</text>
    <text x="540" y="170" text-anchor="middle" font-size="22" fill="#0F0F0E" font-weight="700">팔</text>
    <text x="540" y="195" text-anchor="middle" font-size="12" fill="#666" letter-spacing="1">Upper Arm</text>

    <line x1="625" y1="160" x2="655" y2="160" stroke="#B8985C" stroke-width="2"/>
    <polygon points="655,155 670,160 655,165" fill="#B8985C"/>

    <!-- 04 클럽 -->
    <rect x="675" y="100" width="100" height="120" rx="4" fill="#0F2922" stroke="#0F2922" stroke-width="2"/>
    <text x="725" y="135" text-anchor="middle" font-size="13" fill="#B8985C" font-weight="600" letter-spacing="2">04</text>
    <text x="725" y="170" text-anchor="middle" font-size="22" fill="#F8F2E5" font-weight="700">클럽</text>
    <text x="725" y="195" text-anchor="middle" font-size="12" fill="#B8985C" letter-spacing="1">Club</text>
  </g>

  <!-- 상단 라벨 -->
  <text x="400" y="50" text-anchor="middle" font-size="14" fill="#B8985C" letter-spacing="3" font-weight="500">KINEMATIC SEQUENCE</text>
  <line x1="370" y1="68" x2="430" y2="68" stroke="#B8985C" stroke-width="2"/>

  <!-- 하단 캡션 -->
  <text x="400" y="265" text-anchor="middle" font-size="13" fill="#0F0F0E" letter-spacing="0.5">큰 분절이 먼저 가속·감속하면서 다음 분절로 에너지가 전달됩니다</text>
  <text x="400" y="290" text-anchor="middle" font-size="13" fill="#666">각 분절의 피크 속도가 계단형으로 나타나야 효율적인 스윙입니다</text>
</svg>
